server {
    listen 80;
    server_name localhost;

    root /var/www/html/public;
    index index.php;

    # Solo responde a rutas de devtools — todo lo demás retorna 404
    # El load balancer externo debe rutear solo /innertia/devtools/ a este worker
    location ~* ^/innertia/devtools/ {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location / {
        return 404;
    }

    location ~ /\.ht {
        deny all;
    }
}

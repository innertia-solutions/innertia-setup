services:
  api:
    build:
      context: ./backend
      dockerfile: docker/prod/Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: "production"
      APP_DEBUG: "false"

  frontend:
    build:
      context: ./frontend
      dockerfile: docker/prod/Dockerfile
    restart: unless-stopped

  database:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  # ── Devtools worker (opcional) ─────────────────────────────────────────────
  # Worker PHP-FPM dedicado para Olimpo Devtools (DB Browser + Tinker remoto).
  # Corre sin Octane/Swoole para aislar eval() del event loop principal.
  #
  # Activar: docker compose --profile devtools up -d devtools
  # Apagar:  docker compose stop devtools
  #
  # Configura tu nginx externo para rutear /innertia/devtools/ a este servicio:
  #   location ~* ^/innertia/devtools/ { proxy_pass http://devtools:80; }
  devtools:
    build:
      context: ./backend
      dockerfile: docker/prod/Dockerfile.devtools
    restart: unless-stopped
    environment:
      APP_ENV: "production"
      APP_DEBUG: "false"
      DEVTOOLS_ENABLED: "true"
    profiles:
      - devtools

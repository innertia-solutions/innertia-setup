services:
  api:
    build:
      context: ./backend
      dockerfile: docker/prod/Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: "production"
      APP_DEBUG: "false"

  frontend:
    build:
      context: ./frontend
      dockerfile: docker/prod/Dockerfile
    restart: unless-stopped

  database:
    restart: unless-stopped

  redis:
    restart: unless-stopped

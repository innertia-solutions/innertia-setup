; PHP Configuration File

; Error Reporting
error_reporting = E_ALL
display_errors = On
display_startup_errors = On

; Timezone
date.timezone = "UTC"

; File Uploads
file_uploads = On
upload_max_filesize = 10M
post_max_size = 10M

; Memory Limits
memory_limit = 256M

; Max Execution Time
max_execution_time = 30

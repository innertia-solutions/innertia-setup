services:
  api:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    working_dir: /var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ".:/var/www/html"
      - "./docker/dev/php.ini:/usr/local/etc/php/php.ini"
    ports:
      - "{{APP_PORT}}:80"
      - "{{XDEBUG_PORT}}:{{XDEBUG_PORT}}"
    environment:
      APP_ENV: "local"
      APP_DEBUG: "true"
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: {{PROJECT_NAME}}
      DB_USERNAME: root
      DB_PASSWORD: {{DB_PASSWORD}}
      XDEBUG_MODE: debug
      XDEBUG_CONFIG: client_host=host.docker.internal client_port={{XDEBUG_PORT}} start_with_request=yes idekey=vscode
      XDEBUG_LOG: /tmp/xdebug.log
      XDEBUG_LOG_LEVEL: "0"
    env_file:
      - .env

  database:
    image: postgres:16
    platform: linux/amd64
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: {{DB_PASSWORD}}
      POSTGRES_DB: {{PROJECT_NAME}}
    ports:
      - "{{DB_PORT}}:5432"
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d {{PROJECT_NAME}}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "{{REDIS_PORT}}:6379"
    volumes:
      - redis:/data
    command: redis-server --appendonly yes

volumes:
  postgres:
  redis:

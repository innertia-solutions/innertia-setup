name: Publish PHP Base Images

on:
  push:
    paths:
      - 'docker-base/**'
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: innertia-solutions

jobs:
  build-dev:
    name: php-base-dev:8.4
    runs-on: ubuntu-latest
    environment: secrets
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: docker-base/dev
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.ORG }}/php-base-dev:8.4
            ghcr.io/${{ env.ORG }}/php-base-dev:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.ORG }}/php-base-dev:cache
          cache-to:   type=registry,ref=ghcr.io/${{ env.ORG }}/php-base-dev:cache,mode=max

      # Fuerza visibilidad pública para que no se requiera login al hacer docker pull.
      # Requiere un PAT clásico con scope "write:packages" guardado como GH_PAT en la org.
      - name: Make package public
        if: ${{ secrets.GH_PAT != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /orgs/${{ env.ORG }}/packages/container/php-base-dev \
            -f visibility=public || true

  build-prod:
    name: php-base-prod:8.4
    runs-on: ubuntu-latest
    environment: secrets
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: docker-base/prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.ORG }}/php-base-prod:8.4
            ghcr.io/${{ env.ORG }}/php-base-prod:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.ORG }}/php-base-prod:cache
          cache-to:   type=registry,ref=ghcr.io/${{ env.ORG }}/php-base-prod:cache,mode=max

      - name: Make package public
        if: ${{ secrets.GH_PAT != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /orgs/${{ env.ORG }}/packages/container/php-base-prod \
            -f visibility=public || true
